<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de comparacion</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ static_version }}" />
  </head>
  <body>
    <main class="page">
      <section class="card section-card">
        <div class="card-header">
          <h1>Dashboard de comparacion</h1>
          <p>Placeholder minimo mientras se construye la UI completa del ranking.</p>
        </div>
        <p>Participantes: {{ summary.participants }}</p>
        <p>Top historico: {{ summary.leaders | join(', ') if summary.leaders else '-' }}</p>
      </section>
    </main>
  </body>
</html>
